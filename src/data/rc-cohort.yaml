networks:
  miceli:
    name: "Miceli Social"
    role: "Rural network · scout · co-funder"
    contribution_eur: 6000
    web: "https://miceli.social"
    accent: forest
    summary: >
      A cooperative service hub within the social economy focused on rural resilience,
      based in Ripoll (Girona). Catalyzes regenerative development in rural areas by
      supporting municipalities and community groups.
  keras-buti:
    name: "La Fundició / Keras Buti"
    role: "Urban network · scout · co-funder"
    contribution_eur: 5000
    web: "https://lafundicio.net"
    accent: rust
    summary: >
      A cultural and social innovation cooperative and official hub within the Xarxa
      d'Ateneus Cooperatius, based in L'Hospitalet de Llobregat. Brings a strong urban
      and peri-urban lens to the cohort.

