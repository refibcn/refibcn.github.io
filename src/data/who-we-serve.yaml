# Audience segments for /who-we-serve. Plain, grounded, ESS↔Web3 voice (SOUL.md).
# `signals` = "you're a fit if…" lines, each drawn from the segment's body copy.
# `pillars` maps the segment to the capabilities that serve it.
intro: |
  We work with organizations that are already doing regenerative or cooperative
  work and need the systems, funding pathways, or facilitation to do more of it.
  Primarily across Catalonia — where the Economia Social i Solidària tradition
  runs deep — and secondarily with Italian and Brazilian organizations we share
  language and culture with.
audiences:
  - name: Cooperatives & ESS organizations
    pillars: [tissue, flow]
    body: |
      Cooperatives, associations, and social-economy enterprises sitting on
      knowledge, processes, and relationships they can't yet see clearly. We
      structure that into living systems, automate the repetitive parts, and —
      where it helps — open transparent funding pathways through tools like Safe
      and Gitcoin. Cooperative governance stays in charge; the tooling serves it.
    signals:
      - Your knowledge lives in people's heads and scattered drives
      - Repetitive admin eats the time that should go to the mission
      - Funding pathways feel opaque to your members
  - name: Regenerative networks & programs
    pillars: [tissue, neural]
    body: |
      Place-based networks running programs across many partners and territories.
      We design and facilitate the program, map the portfolio into something
      navigable, and coordinate multi-stakeholder funding rounds — as we did for
      Regenerant Catalunya.
    signals:
      - Many partners, many territories, no shared picture of the whole
      - A funding round to run across stakeholders who don't share tools
      - Coordination sits on one person's memory
  - name: Community land trusts, time banks & commons projects
    pillars: [neural]
    body: |
      Commons-oriented projects that need their shared resources made legible and
      durable. We build knowledge commons that stay maintainable and grow without
      collapsing into clutter, so a community can actually use what it holds.
    signals:
      - Shared resources scattered across private drives and chat threads
      - Documentation that decays faster than it grows
      - New members can't find what the community already knows
  - name: Funders & ReFi infrastructure
    pillars: [flow, tissue]
    body: |
      Funders and global regenerative-finance infrastructure looking for a
      grounded local node in Catalonia. We bridge between on-the-ground
      cooperatives and the wider ReFi ecosystem — naming specific tools (Safe,
      Karma GAP, Celo Public Goods) and using them where they add real value.
    signals:
      - You need a trusted local operator, not another intermediary
      - Your tooling needs grounding in real cooperative practice
      - You want capital to reach projects, not overhead
secondary: |
  Beyond Catalonia, we work with Italian and Brazilian regenerative organizations
  — a language and culture proximity that lets us bridge contexts other providers
  can't reach as easily.
